<!doctype html>
<html dir="rtl">

    <!-- 1. التحميل المسبق لصورة الـ LCP (أكبر عنصر مرئي في الشاشة الأولى للموقع) -->
    <!-- هذا التوجيه يكسر أي تأخير ويأمر المتصفح بتحميل الصورة فوراً بشكل متوازٍ -->
    <link
      rel="preload"
      as="image"
      type="image/webp"
      href="/src/assets/hero-bg.webp"
      fetchpriority="high"
    />

    <!-- 2. أيقونة الموقع مع تحديد الـ type لسرعة التعرف عليها -->
    <link rel="icon" type="image/webp" href="src/assets/logorealestate.webp" />

    <!-- 3. استدعاء ملف الـ CSS الرئيسي (يأتي بعد الـ Preloads مباشرة لتبدأ رندرة الصفحة) -->
    <link rel="stylesheet" href="src/style.css" />
  </head>

    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
